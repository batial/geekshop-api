services:
  postgres:
    image: postgres:16
    container_name: geekshop-db
    environment:
      POSTGRES_DB: geekshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - geekshop_data:/var/lib/postgresql/data

volumes:
  geekshop_data: